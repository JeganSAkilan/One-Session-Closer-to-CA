<!DOCTYPE html>
<html>
<head>
<title>One Session Closer to CA</title>

<style>

body{
font-family:Arial, sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
padding:20px;
transition:background 0.4s;
}

#timer{
font-size:60px;
margin:25px 0;
}

button{
padding:15px 30px;
font-size:18px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#readBtn{background:green;color:white;}
#relaxBtn{background:orange;color:white;}
#stopBtn{background:#444;color:white;}
#resetBtn{background:red;color:white;}

select{
padding:10px;
font-size:16px;
margin-top:10px;
}

#log{
margin-top:40px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

#summary{
margin-top:30px;
font-size:18px;
}

</style>
</head>

<body>

<h1>One Session Closer to CA</h1>

<div id="datetime"></div>

<div id="timer">00:00:00</div>

<select id="subject">
<option value="FR">FR</option>
<option value="AFM">AFM</option>
<option value="Audit">Audit</option>
<option value="DT">DT</option>
<option value="IDT">IDT</option>
<option value="IBS">IBS</option>
</select>

<br>

<button id="readBtn" onclick="startRead()">READ</button>
<button id="relaxBtn" onclick="startRelax()">RELAX</button>
<button id="stopBtn" onclick="stopTimer()">STOP</button>
<button id="resetBtn" onclick="resetTimer()">RESET</button>

<h3>CONTROL TIME CONQUER TITLE</h3>

<div>Total Read Time: <span id="totalRead">00:00:00</span></div>

<div id="summary"></div>

<div id="log">

<h2>Session Log</h2>

<table>

<tr>
<th>Date</th>
<th>Subject</th>
<th>Mode</th>
<th>Duration</th>
</tr>

<tbody id="logTable"></tbody>

</table>

</div>

<script>

let timer;
let seconds=0;
let mode="";
let totalRead=0;

let flickerInterval;
let flickerSpeed=0;

let logs = JSON.parse(localStorage.getItem("studyLogs")) || [];

function format(sec){

let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

return String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

}

function updateTimer(){

seconds++;

document.getElementById("timer").innerText=format(seconds);

if(mode=="RELAX"){

if(seconds>=300 && flickerSpeed!=900){
startFlicker(900);
}

if(seconds>=600 && flickerSpeed!=250){
startFlicker(250);
}

}

}

function startFlicker(speed){

clearInterval(flickerInterval);

flickerSpeed=speed;

let toggle=false;

flickerInterval=setInterval(()=>{

document.body.style.background = toggle ? "#ffcccc" : "#ff6666";

toggle=!toggle;

},speed);

}

function stopFlicker(){

clearInterval(flickerInterval);
flickerSpeed=0;

}

function startRead(){

switchMode("READ");

stopFlicker();

document.body.style.background="#e8ffe8";

}

function startRelax(){

switchMode("RELAX");

document.body.style.background="#ffcccc";

}

function switchMode(newMode){

if(mode!="" && seconds>0){
logSession();
}

mode=newMode;
seconds=0;

clearInterval(timer);

timer=setInterval(updateTimer,1000);

}

function stopTimer(){

clearInterval(timer);

stopFlicker();

if(mode!="" && seconds>0){
logSession();
}

mode="";

}

function resetTimer(){

let confirmReset=confirm("This will erase all logs. Continue?");

if(!confirmReset) return;

localStorage.removeItem("studyLogs");

location.reload();

}

function logSession(){

let now=new Date();

let subject = mode=="RELAX" ? "Break" : document.getElementById("subject").value;

let entry = {

date: now.toLocaleString(),
subject: subject,
mode: mode,
duration: seconds

};

logs.push(entry);

localStorage.setItem("studyLogs",JSON.stringify(logs));

renderLogs();

}

function renderLogs(){

let table=document.getElementById("logTable");

table.innerHTML="";

let subjectTotals={};

totalRead=0;

logs.forEach(log=>{

let row=table.insertRow();

row.insertCell(0).innerText=log.date;
row.insertCell(1).innerText=log.subject;
row.insertCell(2).innerText=log.mode;
row.insertCell(3).innerText=format(log.duration);

if(log.mode=="READ"){

totalRead+=log.duration;

if(!subjectTotals[log.subject]){
subjectTotals[log.subject]=0;
}

subjectTotals[log.subject]+=log.duration;

}

});

document.getElementById("totalRead").innerText=format(totalRead);

let summary="";

for(let sub in subjectTotals){

summary += sub + " : " + format(subjectTotals[sub]) + "<br>";

}

document.getElementById("summary").innerHTML=summary;

}

function updateDateTime(){

let now=new Date();

document.getElementById("datetime").innerText=now.toLocaleString();

}

setInterval(updateDateTime,1000);

renderLogs();

</script>

</body>
</html>
