<!DOCTYPE html>
<html>
<head>
<title>One Session Closer to CA</title>

<style>

body{
font-family:Arial, sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
padding:20px;
transition:background 0.4s;
}

#timer{
font-size:60px;
margin:25px 0;
}

button{
padding:15px 30px;
font-size:18px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#readBtn{background:green;color:white;}
#relaxBtn{background:orange;color:white;}
#stopBtn{background:#444;color:white;}
#resetBtn{background:red;color:white;}

select{
padding:10px;
font-size:16px;
margin-top:10px;
}

#log{
margin-top:40px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

#summary{
margin-top:25px;
font-size:18px;
}

</style>
</head>

<body>

<h1>One Session Closer to CA</h1>

<div id="datetime"></div>

<div id="timer">00:00:00</div>

<select id="subject">
<option value="FR">FR</option>
<option value="AFM">AFM</option>
<option value="Audit">Audit</option>
<option value="DT">DT</option>
<option value="IDT">IDT</option>
<option value="IBS">IBS</option>
</select>

<br>

<button id="readBtn" onclick="startRead()">READ</button>
<button id="relaxBtn" onclick="startRelax()">RELAX</button>
<button id="stopBtn" onclick="stopTimer()">STOP</button>
<button id="resetBtn" onclick="resetTimer()">RESET</button>

<h3>CONTROL TIME CONQUER TITLE</h3>

<div>Total Read Time: <span id="totalRead">00:00:00</span></div>

<div id="summary"></div>

<div id="log">

<h2>Session Log</h2>

<table>

<tr>
<th>Date</th>
<th>Subject</th>
<th>Mode</th>
<th>Duration</th>
</tr>

<tbody id="logTable"></tbody>

</table>

</div>

<script>

let mode = "";
let startTime = null;
let timer;

let flickerInterval;
let flickerSpeed = 0;

let logs = JSON.parse(localStorage.getItem("studyLogs")) || [];

function format(sec){

let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

return String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

}

function getElapsed(){

if(!startTime) return 0;

return Math.floor((Date.now() - startTime) / 1000);

}

function updateTimer(){

let seconds = getElapsed();

document.getElementById("timer").innerText = format(seconds);

if(mode=="RELAX"){

if(seconds>=300 && flickerSpeed!=900){
startFlicker(900);
}

if(seconds>=600 && flickerSpeed!=250){
startFlicker(250);
}

}

}

function startFlicker(speed){

clearInterval(flickerInterval);

flickerSpeed = speed;

let toggle=false;

flickerInterval=setInterval(()=>{

document.body.style.background =
toggle ? "#ffcccc" : "#ff6666";

toggle=!toggle;

},speed);

}

function stopFlicker(){

clearInterval(flickerInterval);
flickerSpeed=0;

}

function startSession(newMode){

if(startTime){
stopTimer();
}

mode = newMode;
startTime = Date.now();

localStorage.setItem("currentMode",mode);
localStorage.setItem("startTime",startTime);

timer = setInterval(updateTimer,1000);

}

function startRead(){

startSession("READ");
stopFlicker();
document.body.style.background="#e8ffe8";

}

function startRelax(){

startSession("RELAX");
document.body.style.background="#ffcccc";

}

function stopTimer(){

clearInterval(timer);

let seconds = getElapsed();

if(seconds>0){

let subject = mode=="RELAX"
? "Break"
: document.getElementById("subject").value;

logs.push({
date:new Date().toLocaleString(),
subject:subject,
mode:mode,
duration:seconds
});

localStorage.setItem("studyLogs",JSON.stringify(logs));

}

mode="";
startTime=null;

localStorage.removeItem("currentMode");
localStorage.removeItem("startTime");

document.getElementById("timer").innerText="00:00:00";

stopFlicker();

renderLogs();

}

function resetTimer(){

if(!confirm("Erase all logs?")) return;

localStorage.clear();
location.reload();

}

function renderLogs(){

let table=document.getElementById("logTable");
table.innerHTML="";

let subjectTotals={};
let totalRead=0;

logs.forEach(log=>{

let row=table.insertRow();

row.insertCell(0).innerText=log.date;
row.insertCell(1).innerText=log.subject;
row.insertCell(2).innerText=log.mode;
row.insertCell(3).innerText=format(log.duration);

if(log.mode=="READ"){

totalRead+=log.duration;

if(!subjectTotals[log.subject]){
subjectTotals[log.subject]=0;
}

subjectTotals[log.subject]+=log.duration;

}

});

document.getElementById("totalRead").innerText=format(totalRead);

let summary="";

for(let sub in subjectTotals){

summary += sub + " : " + format(subjectTotals[sub]) + "<br>";

}

document.getElementById("summary").innerHTML = summary;

}

function restoreSession(){

let savedMode = localStorage.getItem("currentMode");
let savedStart = localStorage.getItem("startTime");

if(savedMode && savedStart){

mode = savedMode;
startTime = parseInt(savedStart);

timer = setInterval(updateTimer,1000);

}

}

function updateDateTime(){

document.getElementById("datetime").innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

renderLogs();
restoreSession();

</script>

</body>
</html>
